# Application properties
spring.application.name=Hexagon
api.version=v1

# Profile
spring.profiles.active=postgres
#spring.profiles.active=mongo

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:hexagon_db}
spring.datasource.username=${POSTGRES_USER:hexagon_user}
spring.datasource.password=${POSTGRES_PASSWORD:hexagon_password}

# MongoDB Database
spring.mongodb.host=${MONGO_HOST:localhost}
spring.mongodb.port=27017
spring.mongodb.database=${MONGO_DATABASE:hexagon_mongo}
spring.mongodb.username=${MONGO_USER:hexagon_user}
spring.mongodb.password=${MONGO_PASSWORD:hexagon_password}
spring.mongodb.authentication-database=admin

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration